name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME}
          TARGET=${{ matrix.target }}
          ARCHIVE="escutcheon-${TAG}-${TARGET}.tar.gz"
          cp target/${TARGET}/release/knock-ssh .
          cp target/${TARGET}/release/knock-sshd .
          tar czf "${ARCHIVE}" knock-ssh knock-sshd
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  update-formula:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute sha256 for macOS x86_64 tarball
        run: |
          TAG=${GITHUB_REF_NAME}
          URL="https://github.com/tstapler/escutcheon/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -fsSL "${URL}" | sha256sum | awk '{print $1}')
          VERSION=${TAG#v}
          sed -i "s/sha256 \"[0-9a-f]*\"/sha256 \"${SHA}\"/" Formula/escutcheon.rb
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" Formula/escutcheon.rb || true

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/escutcheon.rb
          git commit -m "chore: update formula for ${GITHUB_REF_NAME}"
          git push
