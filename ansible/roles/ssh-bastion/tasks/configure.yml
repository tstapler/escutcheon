---
- name: Ensure config directory exists
  ansible.builtin.file:
    path: /etc/escutcheon
    state: directory
    mode: "0750"
    owner: root
    group: root

- name: Write knock-sshd config
  ansible.builtin.template:
    src: sshd.toml.j2
    dest: /etc/escutcheon/sshd.toml
    mode: "0640"
    owner: root
    group: root
  notify: Restart knock-sshd
