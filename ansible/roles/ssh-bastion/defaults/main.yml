---
# ── Port & knock sequence ────────────────────────────────────────────────────
# NEVER set these statically — they are generated by `escutcheon init` and
# stored in 1Password. Resolve them in group_vars/bastion.yml like this:
#
#   ssh_bastion_port: >-
#     {{ lookup('community.general.onepassword',
#               'Escutcheon/' + inventory_hostname,
#               field='ssh_port') | int }}
#   ssh_bastion_knock_sequence: >-
#     {{ lookup('community.general.onepassword',
#               'Escutcheon/' + inventory_hostname,
#               field='knock_sequence') | from_json }}
#
# The defaults below are empty/zero so the role fails loudly if you forget.
ssh_bastion_port: 0
ssh_bastion_knock_sequence: []
ssh_bastion_knock_proto: tcp
ssh_bastion_knock_close_sequence: []   # defaults to reverse of knock_sequence if empty

# ── Timing ───────────────────────────────────────────────────────────────────
ssh_bastion_open_secs: 30     # seconds port stays open after knock
ssh_bastion_ttl_secs: 10      # seconds to complete knock sequence before reset

# ── Firewall ─────────────────────────────────────────────────────────────────
# ufw | firewalld | iptables | nftables | pf | none
ssh_bastion_firewall: "{{ 'ufw' if ansible_os_family == 'Debian' else 'firewalld' }}"

# ── knock-sshd binary ────────────────────────────────────────────────────────
ssh_bastion_install_dir: /usr/local/bin
ssh_bastion_version: latest       # or "v0.1.0" to pin
ssh_bastion_interface: ""         # e.g. "eth0"; empty = auto-detect

# ── User access ──────────────────────────────────────────────────────────────
ssh_bastion_user: "{{ ansible_user | default('ubuntu') }}"

# Dedicated ed25519 key for headless Ansible (NOT your main SSH key).
# Generate: ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519_<hostname>
# Store both halves in 1Password; pass only the pubkey here.
# Resolve in group_vars: lookup('community.general.onepassword', 'Escutcheon/<host>', field='ansible_pubkey')
ssh_bastion_ansible_pubkey: ""

ssh_bastion_fido2_pubkeys: []    # sk-ed25519/sk-ecdsa-sk keys for YubiKey/Titan
ssh_bastion_op_pubkeys: []       # additional ed25519 keys from 1Password

# ── Tailscale variant ─────────────────────────────────────────────────────────
ssh_bastion_use_tailscale: false  # true = skip knock-sshd, rely on Tailscale

# ── sshd hardening ───────────────────────────────────────────────────────────
ssh_bastion_max_auth_tries: 3
ssh_bastion_login_grace_time: "30s"
ssh_bastion_client_alive_interval: 60
ssh_bastion_client_alive_count_max: 10
ssh_bastion_allow_agent_forwarding: "yes"
ssh_bastion_allow_tcp_forwarding: "yes"
ssh_bastion_log_level: VERBOSE

ssh_bastion_ciphers:
  - chacha20-poly1305@openssh.com
  - aes256-gcm@openssh.com
  - aes128-gcm@openssh.com

ssh_bastion_macs:
  - hmac-sha2-512-etm@openssh.com
  - hmac-sha2-256-etm@openssh.com

ssh_bastion_kex_algorithms:
  - curve25519-sha256
  - curve25519-sha256@libssh.org
  - diffie-hellman-group16-sha512
  - diffie-hellman-group18-sha512
